<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Livro de Erros | Base de Conhecimento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="bg-[#0b0e14] text-gray-200">
    <div class="max-w-5xl mx-auto p-6">
        <header class="flex justify-between items-center py-6 border-b border-gray-800 mb-8">
            <h1 class="text-2xl font-bold text-emerald-500">Livro De Erros Sistema</h1>
            <form action="/" method="get">
                <input type="text" name="busca" placeholder="Buscar solução..."
                    class="bg-gray-900 border border-gray-700 px-4 py-2 rounded-md focus:outline-emerald-500">
            </form>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <aside class="md:col-span-1">
                <div class="bg-gray-900 p-5 rounded-lg border border-gray-800 sticky top-6">
                    <h2 class="text-lg font-semibold mb-4 text-emerald-400">Novo Registro</h2>
                    <form action="/salvar" method="post" class="space-y-4">
                        <input type="text" name="codigo" placeholder="Código (ex: E067)" required
                            class="w-full bg-gray-800 p-2 rounded border border-gray-700 text-emerald-400 font-bold uppercase">

                        <textarea name="descricao" placeholder="Descrição: O que aconteceu?" required
                            class="w-full bg-gray-800 p-2 rounded border border-gray-700 h-20"></textarea>

                        <textarea name="causas" placeholder="Possíveis Causas (O que pode estar gerando isso?)"
                            class="w-full bg-gray-800 p-2 rounded border border-gray-700 h-20"></textarea>

                        <textarea name="solucao" placeholder="Possíveis Soluções (Como resolvemos?)" required
                            class="w-full bg-gray-800 p-2 rounded border border-gray-700 h-32"></textarea>

                        <!--<input type="text" name="tags" placeholder="Tags: NFE, NFSe, etc"
                            class="w-full bg-gray-800 p-2 rounded border border-gray-700">-->
                        <button
                            class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 rounded transition">Salvar
                            no Livro</button>
                    </form>
                </div>
            </aside>

            <main class="md:col-span-2 space-y-4">
                {% for erro in erros %}
                <div class="bg-gray-900 p-6 rounded-lg border border-gray-800 border-l-4 border-emerald-600 shadow-xl">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span
                                class="bg-emerald-900 text-emerald-300 px-3 py-1 rounded text-sm font-bold mr-2 uppercase">{{
                                erro.codigo }}</span>
                            <h3 class="text-xl font-bold text-white inline italic">"{{ erro.descricao }}"</h3>
                        </div>
                        <span class="text-xs text-gray-600">{{ erro.data.strftime('%d/%m/%Y') }}</span>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-gray-800 p-3 rounded border border-red-900/30">
                            <h4 class="text-xs font-bold text-red-400 uppercase mb-2">🚩 Causas Prováveis</h4>
                            <div class="text-sm text-gray-300 solution-content">{{ erro.causas }}</div>
                        </div>
                        <div class="bg-gray-800 p-3 rounded border border-emerald-900/30">
                            <h4 class="text-xs font-bold text-emerald-400 uppercase mb-2">💡 Soluções</h4>
                            <div class="text-sm text-gray-300 solution-content">{{ erro.solucao }}</div>
                        </div>
                    </div>

                    <div class="mt-3 text-xs text-gray-500 uppercase">🏷️ Tags: {{ erro.tags }}</div>
                </div>
                {% endfor %}
            </main>
        </div>
    </div>
    <script>
        document.querySelectorAll('.solution-content').forEach(el => {
            el.innerHTML = marked.parse(el.innerText);
        });
    </script>
</body>

</html>
